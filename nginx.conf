# ============================================================
# nginx.conf — Configuração do Tornadex
# Proxy reverso para o servidor Node.js (porta 3001)
# Arquivos estáticos servidos diretamente pelo nginx
# ============================================================

# Configuração de upstream para o servidor Node.js
upstream tornadex_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Sem server_name por enquanto (acesso por IP)
    # Quando tiver domínio, descomentar:
    # server_name tornadex.com www.tornadex.com;

    # ---- Raiz dos arquivos estáticos (client buildado) ----
    root /opt/tornadex/dist/client;
    index index.html;

    # ---- Compressão Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    # ---- Arquivos estáticos com cache longo ----
    # Assets com hash no nome (Vite gera hashes) — cache agressivo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Socket.IO — proxy com suporte a WebSocket ----
    location /socket.io/ {
        proxy_pass http://tornadex_backend;
        proxy_http_version 1.1;

        # Headers para upgrade de WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers padrão de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts maiores para WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Desabilitar buffering para WebSocket
        proxy_buffering off;
    }

    # ---- API endpoints — proxy para Node.js ----
    location /health {
        proxy_pass http://tornadex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
        proxy_pass http://tornadex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://tornadex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA fallback — tudo que não é arquivo vai para index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Segurança básica ----
    # Esconder versão do nginx
    server_tokens off;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Bloquear acesso a arquivos ocultos (.git, .env, etc)
    location ~ /\. {
        deny all;
        return 404;
    }
}
